<!DOCTYPE html>

<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #FFFAF5;
    }

    .hero {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4 / 3;
      background: url('/tteona-character.png') center center / cover no-repeat;
    }

    .bottom {
      width: 100%;
      max-width: 480px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px 48px;
      text-align: center;
      gap: 12px;
    }

    h1 {
      font-size: 36px;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 15px;
      color: #999;
      line-height: 1.7;
    }

    .app-store-btn {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 17px 32px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .app-store-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="hero"></div>
