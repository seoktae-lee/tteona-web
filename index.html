<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>떠나 — 오늘, 어디로 떠나볼까요?</title>
  <meta property="og:title" content="떠나 — 오늘, 어디로 떠나볼까요?">
  <meta property="og:description" content="나만의 여행 코스를 기록하고 공유해보세요">
  <meta property="og:image" content="https://tteona.kr/tteona-character.png">
  <meta property="og:url" content="https://tteona.kr">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: #FFFAF5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      overflow: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .blob1 { width: 400px; height: 400px; background: #FF6B35; top: -100px; right: -100px; }
    .blob2 { width: 300px; height: 300px; background: #FFB347; bottom: -80px; left: -80px; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 48px 40px 40px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(255,107,53,0.12), 0 2px 12px rgba(0,0,0,0.06);
    }

    .character {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 4px;
      filter: drop-shadow(0 8px 20px rgba(255,107,53,0.2));
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B35, #FFB347);
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #FFF3EE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .feature-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
    }

    .app-store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      width: 100%;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .app-store-btn:active {
      transform: scale(0.97);
    }

    .app-store-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <div class="card">
    <img class="character" src="/tteona-character.png" alt="떠나 캐릭터">
    <div class="badge">Travel with Us ✈️</div>
    <h1>떠나</h1>
    <p class="subtitle">오늘 하루를 여행처럼 기록하고<br>나만의 코스를 친구에게 공유해요</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🗺️</div>
        <span class="feature-label">코스 공유</span>
      </div>
      <div class="feature">
        <div class="feature-icon">🎬</div>
        <span class="feature-label">브이로그</span>
      </div>
      <div class="feature">
        <div class="feature-icon">📍</div>
        <span class="feature-label">장소 기록</span>
      </div>
    </div>

    <a class="app-store-btn" href="https://apps.apple.com/app/id000000000">
      <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.7 0 663.5 0 541.8c0-207.8 134.9-317.9 267.9-317.9 75.3 0 137.9 49.2 184.2 49.2 44.4 0 114.5-52.1 201.5-52.1zM568.5 81.4C588.5 55.4 602.8 19.9 602.8 0c0-1.9-.1-3.8-.3-5.7-30.5 1.1-67.1 20.4-89.3 47.9-17.9 21.3-35.5 57.2-35.5 87.2 0 2 .3 4 .5 4.7 2 .3 4.1.5 6.1.5 28.3 0 63.2-18.8 84.2-53.2z"/>
      </svg>
      App Store에서 다운로드
    </a>
  </div>

  <p class="footer">© 2025 Tteona. Made with ❤️</p>
</body>
</html>
