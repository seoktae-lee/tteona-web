<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tteona — 코스 공유</title>
  <meta property="og:title" content="떠나에서 코스를 공유했어요!">
  <meta property="og:description" content="떠나 앱에서 이 코스를 확인해보세요">
  <meta property="og:image" content="https://tteona.kr/og-image.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      min-height: 100vh;
      background: url('/tteona-character.png') center center / cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 60px;
    }

    .bottom {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px;
      text-align: center;
      gap: 8px;
    }

    .app-title {
      font-size: 42px;
      font-weight: 900;
      color: #FF6B35;
      letter-spacing: -1px;
      text-shadow: 0 2px 16px rgba(255,107,53,0.18);
    }

    .course-name {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 2px;
    }

    .open-btn {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FF6B35;
      color: #fff;
      text-decoration: none;
      padding: 17px 32px;
      border-radius: 18px;
      font-size: 17px;
      font-weight: 700;
      width: 100%;
      box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    }

    .divider {
      font-size: 13px;
      color: #888;
      margin: 4px 0;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 17px 32px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .store-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
      flex-shrink: 0;
    }
  </style>
  <script>
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id');
    const courseName = params.get('name') || '';

    window.onload = function() {
      if (courseName) {
        document.getElementById('courseName').textContent = courseName;
      }
      if (courseId) {
        document.getElementById('openBtn').href = 'tteona://course?id=' + courseId;
      }
      document.querySelector('meta[property="og:title"]').content =
        (courseName ? courseName + ' — ' : '') + '떠나에서 코스를 공유했어요!';
    };
  </script>
</head>
<body>
  <div class="bottom">
    <a class="open-btn" id="openBtn" href="#">
      떠나 앱에서 열기
    </a>
    <div class="divider">— 앱이 없다면 —</div>
    <a class="store-btn" href="https://apps.apple.com/kr/app/%EB%96%A0%EB%82%98/id6767218543">
      <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.7 0 663.5 0 541.8c0-207.8 134.9-317.9 267.9-317.9 75.3 0 137.9 49.2 184.2 49.2 44.4 0 114.5-52.1 201.5-52.1zM568.5 81.4C588.5 55.4 602.8 19.9 602.8 0c0-1.9-.1-3.8-.3-5.7-30.5 1.1-67.1 20.4-89.3 47.9-17.9 21.3-35.5 57.2-35.5 87.2 0 2 .3 4 .5 4.7 2 .3 4.1.5 6.1.5 28.3 0 63.2-18.8 84.2-53.2z"/>
      </svg>
      App Store에서 다운로드
    </a>
  </div>
</body>
</html>
